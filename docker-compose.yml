# docker-compose.yml — long-lived MCP server on http://localhost:8000/mcp
# (Streamable HTTP transport).
#
# Quick start:
#   cp .env.example .env        # fill in HYPERLIQUID_PRIVATE_KEY + VAULT_ADDRESS
#   docker compose up -d
#   curl -sf http://localhost:8000/health   # "ok" = healthy
#
# Runtime config (risk caps, network, live_trading) lives in /data/settings.json
# inside the named volume `hyperliquid-mcp-data`. Edit it via MCP tools at
# runtime — changes persist across `docker compose restart` and `up -d` rebuilds.

services:
  mcp:
    build: .
    image: ghcr.io/rsantamaria01/hyperliquid-trading-mcp:latest
    container_name: hyperliquid-trading-mcp
    restart: unless-stopped
    ports:
      - "8000:8000"   # exposed on all host interfaces — reach at <host-ip>:8000 (guarded by MCP_AUTH_TOKEN)
    env_file:
      - .env
    volumes:
      - hyperliquid-mcp-data:/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=2)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  hyperliquid-mcp-data:
    name: hyperliquid-mcp-data
