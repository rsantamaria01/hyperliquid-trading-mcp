name: Release

# On a pushed version tag (e.g. v3.0.0): gate on lint+tests, build the
# sdist+wheel, and publish a GitHub Release with those artifacts. The package is
# installed straight from git (uvx --from git+https://...@<tag>), so no registry
# publish is needed — the tag is the pin and the Release is the artifact record.
on:
  push:
    tags: ["v*.*.*"]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
          python-version: "3.12"
      - run: uv sync --locked
      - run: uv run ruff check .
      - run: uv run ruff format --check .
      - run: uv run pytest -q

  release:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write # create releases + upload assets
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
          python-version: "3.12"

      - name: Build sdist + wheel
        run: uv build

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          body: |
            ## Install

            The plugin spawns this server via `uvx` straight from git — no registry:

            ```
            uvx --from git+https://github.com/rsantamaria01/hyperliquid-trading-mcp@${{ github.ref_name }} hyperliquid-trading-mcp
            ```

            Or build locally from the attached wheel. Requires a workspace `.env`
            with `HYPERLIQUID_PRIVATE_KEY` + `HYPERLIQUID_VAULT_ADDRESS`.
