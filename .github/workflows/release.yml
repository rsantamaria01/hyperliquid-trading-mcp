name: Release

# Publish the package to PyPI on a pushed version tag (e.g. v3.0.0).
on:
  push:
    tags: ["v*.*.*"]

jobs:
  # Gate the publish on lint + tests passing for the tagged commit, so a tag on
  # a broken commit never publishes a broken release to PyPI.
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
          python-version: "3.12"
      - run: uv sync --locked
      - run: uv run ruff check .
      - run: uv run ruff format --check .
      - run: uv run pytest -q

  build-and-publish:
    needs: test
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write # required for PyPI Trusted Publishing (OIDC)
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
          python-version: "3.12"

      - name: Build sdist + wheel
        run: uv build

      # Trusted Publishing (OIDC) — no stored token. The PyPI project must
      # register this repo + workflow (release.yml) as a trusted publisher.
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
